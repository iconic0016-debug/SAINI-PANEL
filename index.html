<!DOCTYPE html>
<html>
<head>
<title>SAINI VIP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
  text-align:center;
}

h1{
  color:#38bdf8;
}

.card{
  background:#1e293b;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

button{
  width:90%;
  padding:14px;
  margin:8px;
  border:none;
  border-radius:10px;
  background:#0ea5e9;
  color:white;
  font-size:16px;
}

button:active{
  transform:scale(0.96);
}

#status{
  color:#94a3b8;
}
</style>
</head>

<body>

<h1>VIP PANEL</h1>

<div class="card">
<button onclick="ping()">📶 Ping</button>
<button onclick="boost()">⚡ Boost</button>
<button onclick="ff()">🔥 Free Fire</button>
</div>

<div class="card">
<p id="ip">Loading...</p>
<p id="status">Ready</p>
</div>

<script>
// IP
fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(d=>document.getElementById("ip").innerText="IP: "+d.ip);

// Ping
async function ping(){
 let s=Date.now();
 document.getElementById("status").innerText="Testing...";
 try{
  await fetch("https://1.1.1.1");
  document.getElementById("status").innerText="Ping: "+(Date.now()-s)+" ms";
 }catch{
  document.getElementById("status").innerText="Failed";
 }
}

// Boost
function boost(){
 document.getElementById("status").innerText="Boost Activated ⚡";
}

// FF
function ff(){
 location.href="https://apps.apple.com/in/app/free-fire-max/id1480516829";
}
</script>

</body>
</html>
